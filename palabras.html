<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contador de palabras y caracteres online | ToolHub</title>
<meta name="description" content="Cuenta palabras, caracteres, frases y tiempo de lectura de tu texto gratis y en tiempo real. Sin registro.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
<link rel="stylesheet" href="../assets/style.css">
<!-- ADSTERRA GLOBAL SCRIPT AQUÍ -->
</head>
<body>
<header class="site-header">
  <a href="../index.html" class="logo"><span class="logo-mark">▚</span> Tool<span class="logo-accent">Hub</span></a>
  <nav class="top-nav"><a href="../index.html#herramientas">Herramientas</a></nav>
</header>

<main class="tool-wrap">
  <a href="../index.html" class="back-link">← Todas las herramientas</a>
  <div class="tool-head">
    <span class="tool-ico">✍️</span>
    <h1>Contador de palabras</h1>
    <p>Escribe o pega tu texto. Todo se cuenta al instante.</p>
  </div>

  <div class="ad-slot ad-banner"><span class="ad-label">Publicidad</span><!-- ADSTERRA BANNER --></div>

  <div class="panel">
    <div class="field">
      <label for="txt">Tu texto</label>
      <textarea id="txt" placeholder="Empieza a escribir aquí..." oninput="count()"></textarea>
    </div>
    <div class="stat-grid">
      <div class="stat"><div class="n" id="w">0</div><div class="l">Palabras</div></div>
      <div class="stat"><div class="n" id="c">0</div><div class="l">Caracteres</div></div>
      <div class="stat"><div class="n" id="cs">0</div><div class="l">Sin espacios</div></div>
      <div class="stat"><div class="n" id="s">0</div><div class="l">Frases</div></div>
      <div class="stat"><div class="n" id="p">0</div><div class="l">Párrafos</div></div>
      <div class="stat"><div class="n" id="r">0s</div><div class="l">Lectura</div></div>
    </div>
  </div>

  <div class="ad-slot ad-box" style="margin-left:auto;margin-right:auto"><span class="ad-label">Publicidad</span><!-- ADSTERRA 300x250 --></div>
</main>

<footer class="site-footer"><p>ToolHub © 2026</p><nav><a href="../index.html">Inicio</a></nav></footer>

<script>
function count(){
  const t=document.getElementById('txt').value;
  const words=t.trim()?t.trim().split(/\s+/).length:0;
  document.getElementById('w').textContent=words;
  document.getElementById('c').textContent=t.length;
  document.getElementById('cs').textContent=t.replace(/\s/g,'').length;
  document.getElementById('s').textContent=(t.match(/[.!?]+/g)||[]).length;
  document.getElementById('p').textContent=t.trim()?t.trim().split(/\n+/).length:0;
  const sec=Math.round(words/200*60);
  document.getElementById('r').textContent= sec<60? sec+'s' : Math.round(sec/60)+'min';
}
</script>
</body>
</html>
