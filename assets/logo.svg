<svg width="40" height="40" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ToolHub">
  <rect width="48" height="48" rx="11" fill="#059669"/>
  <g transform="translate(24,24)">
    <!-- grupo rotado: llave -->
    <g transform="rotate(45)" fill="#ffffff">
      <!-- mango llave -->
      <rect x="-2.2" y="-2" width="4.4" height="16" rx="2.2"/>
      <!-- cabeza llave (anillo abierto) -->
      <path d="M -6 -13 a6 6 0 1 0 12 0 a6 6 0 0 0 -12 0 Z M -2.6 -13 a2.6 2.6 0 1 1 5.2 0 a2.6 2.6 0 0 1 -5.2 0 Z M -1.6 -18.2 h3.2 v3.4 h-3.2 Z"/>
    </g>
    <!-- grupo rotado: destornillador -->
    <g transform="rotate(-45)" fill="#ffffff">
      <!-- mango -->
      <rect x="-2" y="-14.5" width="4" height="7" rx="1.6"/>
      <!-- eje -->
      <rect x="-1.3" y="-8" width="2.6" height="18" rx="1.3"/>
      <!-- punta -->
      <path d="M -1.3 10 h2.6 l-1.3 3 Z"/>
    </g>
    <!-- perno central -->
    <circle cx="0" cy="0" r="2.4" fill="#059669" stroke="#ffffff" stroke-width="1.6"/>
  </g>
</svg>
