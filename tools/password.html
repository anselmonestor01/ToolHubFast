<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de contraseñas seguras gratis | ToolHub</title>
<meta name="description" content="Genera contraseñas seguras y aleatorias gratis. Elige longitud, mayúsculas, números y símbolos. Todo local, nada se guarda.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔐</text></svg>">
<link rel="stylesheet" href="../assets/style.css">
<!-- ADSTERRA GLOBAL SCRIPT AQUÍ -->
</head>
<body>
<header class="site-header">
  <a href="../index.html" class="logo"><span class="logo-mark">▚</span> Tool<span class="logo-accent">Hub</span></a>
  <nav class="top-nav"><a href="../index.html#herramientas">Herramientas</a></nav>
</header>

<main class="tool-wrap">
  <a href="../index.html" class="back-link">← Todas las herramientas</a>
  <div class="tool-head">
    <span class="tool-ico">🔐</span>
    <h1>Generador de contraseñas</h1>
    <p>Claves seguras y aleatorias, generadas en tu navegador.</p>
  </div>

  <div class="ad-slot ad-banner"><span class="ad-label">Publicidad</span><!-- ADSTERRA BANNER --></div>

  <div class="panel">
    <div class="field">
      <label>Longitud: <span id="lenval" class="range-val" style="display:inline">16</span></label>
      <div class="range-row">
        <input type="range" id="len" min="4" max="48" value="16" oninput="document.getElementById('lenval').textContent=this.value">
      </div>
    </div>
    <div class="field">
      <label>Incluir</label>
      <div class="checks">
        <label><input type="checkbox" id="up" checked> Mayúsculas</label>
        <label><input type="checkbox" id="low" checked> Minúsculas</label>
        <label><input type="checkbox" id="num" checked> Números</label>
        <label><input type="checkbox" id="sym" checked> Símbolos</label>
      </div>
    </div>
    <button class="btn" onclick="gen()">Generar contraseña</button>
    <div id="out"></div>
  </div>

  <div class="ad-slot ad-box" style="margin-left:auto;margin-right:auto"><span class="ad-label">Publicidad</span><!-- ADSTERRA 300x250 --></div>
</main>

<footer class="site-footer"><p>ToolHub © 2026</p><nav><a href="../index.html">Inicio</a></nav></footer>

<script>
function gen(){
  const len=+document.getElementById('len').value;
  let set='';
  if(document.getElementById('up').checked) set+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(document.getElementById('low').checked) set+='abcdefghijklmnopqrstuvwxyz';
  if(document.getElementById('num').checked) set+='0123456789';
  if(document.getElementById('sym').checked) set+='!@#$%^&*()-_=+[]{};:,.?';
  const out=document.getElementById('out');
  if(!set){out.innerHTML='<div class="result"><p class="result-note">Selecciona al menos un tipo de carácter.</p></div>';return;}
  let pw='';const arr=new Uint32Array(len);crypto.getRandomValues(arr);
  for(let i=0;i<len;i++) pw+=set[arr[i]%set.length];
  // fuerza aproximada
  let bits=len*Math.log2(set.length),fuerza,color;
  if(bits<40){fuerza='Débil';color='#f87171';}
  else if(bits<70){fuerza='Media';color='#fbbf24';}
  else{fuerza='Fuerte';color='#34d399';}
  out.innerHTML=`<div class="result" style="border-left-color:${color}">
    <span class="result-label">Tu contraseña</span>
    <div class="result-value" style="font-size:1.3rem;color:${color}">${pw.replace(/</g,'&lt;')}</div>
    <p class="result-note">Seguridad: <strong style="color:${color}">${fuerza}</strong></p>
    <button class="btn btn-ghost" style="margin-top:12px" onclick="navigator.clipboard.writeText('${pw.replace(/'/g,"\\'")}');this.textContent='✓ Copiada'">Copiar</button>
  </div>`;
}
gen();
</script>
</body>
</html>
