<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de código QR gratis | ToolHub</title>
<meta name="description" content="Crea códigos QR gratis a partir de texto, enlaces, WiFi o contacto. Descarga tu QR en PNG. Sin registro.">
<link rel="icon" href="../assets/logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght;500;600;700;800&family=JetBrains+Mono:wght;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<!-- ADSTERRA GLOBAL SCRIPT AQUÍ -->
</head>
<body>
<header class="site-header">
  <a href="../index.html" class="logo"><img src="../assets/logo.svg" alt="ToolHub logo"> Tool<span class="logo-accent">Hub</span></a>
  <nav class="top-nav"><a href="../index.html#herramientas">Herramientas</a></nav>
</header>

<main class="tool-wrap">
  <a href="../index.html" class="back-link">← Volver a herramientas</a>
  <div class="tool-head">
    <span class="tool-ico">▦</span>
    <div>
      <h1>Generador de QR</h1>
    <p>Convierte cualquier texto o enlace en un código QR.</p>
    </div>
  </div>

  <div class="ad-slot ad-banner"><span class="ad-label">Publicidad</span><!-- ADSTERRA BANNER --></div>

  <div class="panel">
    <div class="field">
      <label for="txt">Texto o enlace</label>
      <input type="text" id="txt" placeholder="https://tu-sitio.com" value="https://toolhub.com" oninput="gen()">
    </div>
    <div class="row">
      <div class="field">
        <label>Tamaño</label>
        <select id="size" onchange="gen()">
          <option value="200">Pequeño (200px)</option>
          <option value="300" selected>Mediano (300px)</option>
          <option value="500">Grande (500px)</option>
        </select>
      </div>
    </div>
    <div id="qrbox"></div>
    <div id="dl"></div>
  </div>

  <div class="ad-slot ad-box" style="margin-left:auto;margin-right:auto"><span class="ad-label">Publicidad</span><!-- ADSTERRA 300x250 --></div>
  <div id="rate" class="rate-widget" data-tool="qr"></div>
</main>

<footer class="site-footer"><p>ToolHub © 2026</p><nav><a href="../index.html">Inicio</a></nav></footer>

<script>
function gen(){
  const txt=document.getElementById('txt').value.trim();
  const size=document.getElementById('size').value;
  const box=document.getElementById('qrbox'),dl=document.getElementById('dl');
  if(!txt){box.innerHTML='<p class="result-note">Escribe algo para generar el QR.</p>';dl.innerHTML='';return;}
  const url=`https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(txt)}`;
  box.innerHTML=`<img src="${url}" alt="Código QR" width="${size}" height="${size}">`;
  dl.innerHTML=`<a class="btn" style="display:block;text-align:center;margin-top:18px;text-decoration:none" href="${url}&download=1" download="qr.png">Descargar PNG</a>`;
}
gen();
</script>
<script src="../assets/rate.js"></script>
</body>
</html>
